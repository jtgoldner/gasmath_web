<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GasMath — the cheapest gas for you, right now</title>
    <meta
      name="description"
      content="GasMath finds the cheapest gas station for you right now — factoring live prices, real driving distance, and your vehicle. One verdict, no account."
    />
    <link rel="canonical" href="https://gasmath.app/" />

    <!-- ?v= busts the browser favicon cache when the icon changes. -->
    <link rel="icon" href="/favicon-32.png?v=2" sizes="32x32" />
    <link rel="icon" href="/icon.svg?v=2" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GasMath" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GasMath" />
    <meta property="og:title" content="GasMath — the cheapest gas for you, right now" />
    <meta
      property="og:description"
      content="The true cheapest fill-up for your car right now — live prices, real driving distance, your vehicle's MPG. One verdict, no account."
    />
    <meta property="og:url" content="https://gasmath.app/" />
    <meta property="og:image" content="https://gasmath.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="GasMath — the cheapest gas for you, right now" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GasMath — the cheapest gas for you, right now" />
    <meta
      name="twitter:description"
      content="The true cheapest fill-up for your car right now — live prices, real driving distance, your vehicle's MPG. One verdict, no account."
    />
    <meta name="twitter:image" content="https://gasmath.app/og-image.png" />
    <meta name="twitter:image:alt" content="GasMath — the cheapest gas for you, right now" />
  </head>
  <body>
    <div id="app"></div>
    <!-- Persistent legal footer (outside #app so SPA re-renders don't remove it).
         Publicly accessible Terms + Privacy are a Google Maps Platform requirement. -->
    <footer class="legal-footer">
      <a href="/privacy.html">Privacy</a>
      <span aria-hidden="true">·</span>
      <a href="/terms.html">Terms</a>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
